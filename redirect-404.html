<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Redirect old bb-metabrowse-links URLs to the new metabrowse SPA.
    // Deploy this as 404.html on the old gh-pages branch.
    // GitHub Pages serves 404.html for any path that doesn't exist,
    // so this catches all deep-linked bookmarks.
    //
    // Old: /pages/training-lmatheson4/bb-metabrowse-links/teach/CPP/index.html
    // New: /pages/training-lmatheson4/metabrowse/#/teach/CPP

    var path = location.pathname;

    // Strip the gh-pages base path prefix
    // Adjust this to match your actual Pages base path
    var basePrefixes = [
      '/pages/training-lmatheson4/bb-metabrowse-links/',
      '/'
    ];

    var relative = path;
    for (var i = 0; i < basePrefixes.length; i++) {
      if (path.indexOf(basePrefixes[i]) === 0) {
        relative = path.slice(basePrefixes[i].length);
        break;
      }
    }

    // Remove trailing index.html and slashes
    relative = relative.replace(/\/index\.html$/, '').replace(/\/+$/, '');

    // Build the new SPA URL
    var newBase = '/pages/training-lmatheson4/metabrowse/';
    var newUrl = location.origin + newBase + '#/' + relative;

    location.replace(newUrl);
  </script>
</head>
<body>
  <p>Redirecting to <a id="link">metabrowse</a>...</p>
  <script>
    document.getElementById('link').href = location.origin + '/pages/training-lmatheson4/metabrowse/';
  </script>
</body>
</html>
