name: Notify metabrowse-links

on:
  push:
    branches: [main]

jobs:
  build-editor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if editor source changed
        id: check
        run: |
          if git diff HEAD~1 --name-only -- editor/src/ editor/package.json editor/vite.config.ts editor/tsconfig.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build editor
        if: steps.check.outputs.changed == 'true'
        run: |
          cd editor
          npm ci
          npm run build

      - name: Commit updated editor dist
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add editor/dist/
          if git diff --cached --quiet; then
            echo "No changes to editor/dist/"
          else
            git commit -m "Auto-rebuild editor/dist from source"
            git push
          fi

  notify:
    needs: build-editor
    runs-on: ubuntu-latest
    steps:
      - name: Trigger metabrowse-links rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.LINKS_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Stabledog/metabrowse-links/dispatches \
            -d '{"event_type": "metabrowse-updated"}'
